<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='milligram.css') }}">
</head>

<body>
    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <h3>Consultar Usuário</h3>
        <p>Insira o nome para acessar o sistema:</p>

        <form action="/usuarios/verificar" method="post">
            <label for="userName">Nome:</label>
            <input type="text" id="userName" name="userName" placeholder="Digite seu nome" required>
            <button type="submit" class="button-primary" style="width: 100%;">Buscar</button>
        </form>

        <!-- Exibe erro caso o usuário não seja encontrado -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <p style="color: #e74c3c; font-weight: bold; margin-top: 15px;">{{ message }}</p>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div style="margin-top: 20px;">
            <a href="/">Voltar ao início</a>
        </div>
    </div>
</body>

</html>
